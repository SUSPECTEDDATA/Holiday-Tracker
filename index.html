    <style>
        body { font-family: 'Inter', system_ui, sans-serif; }
        .font-display { font-family: 'Space Grotesk', 'Inter', sans-serif; font-weight: 600; }
        .calendar-day { transition: all 0.1s cubic-bezier(0.4, 0, 0.2, 1); min-height: 78px; }
        @media (min-width: 640px) { .calendar-day { min-height: 92px; } }
        .calendar-day:hover { background-color: #f8fafc; transform: translateY(-1px); }
        .calendar-day.today { background-color: #fefce8; border: 2px solid #eab308; }
        .leave-dot { width: 6px; height: 6px; border-radius: 9999px; }
        .modal { animation: modalPop 0.2s ease-out forwards; }
        @keyframes modalPop { from { opacity: 0; transform: scale(0.95) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        .status-approved { background-color: #dcfce7; color: #166534; }
        .status-requested { background-color: #fef9c3; color: #854d0e; }
        .status-denied { background-color: #fee2e2; color: #991b1b; }
        .type-holiday { background-color: #d1fae5; color: #065f46; }
        .type-unpaid { background-color: #fef3c7; color: #92400e; }
    </style>

        let currentMonth = new Date().getMonth();

        function parseDate(dateStr) {
            if (!dateStr) return null;
            const [day, month, year] = dateStr.split('/').map(Number);
            return new Date(year, month - 1, day);
        }

        function formatDate(dateStr) {
            const date = parseDate(dateStr);
            if (!date) return dateStr;
            return date.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
        }

        function getDaysBetween(startStr, endStr) {
            const start = parseDate(startStr);
            const end = parseDate(endStr);
            if (!start || !end) return 1;
            const diffTime = Math.abs(end - start);
            return Math.ceil(diffTime / (1000 * 60 * 60 * 24)) + 1;
        }

        function isDateInRange(dayDate, startStr, endStr) {
            const start = parseDate(startStr);
            const end = parseDate(endStr);
            if (!start || !end || !dayDate) return false;
            return dayDate >= start && dayDate <= end;
        }

        function getVisibleLeaves() {
            return leaves.filter(l => l.status !== 'Denied');
        }

        function getLeavesForDate(targetDate) {
            return getVisibleLeaves().filter(leave => isDateInRange(targetDate, leave.start, leave.end));
        }

        function updateStats() {
            const visible = getVisibleLeaves();
            const uniqueEmployees = new Set(visible.map(l => l.employee)).size;
            
            document.getElementById('total-employees').textContent = uniqueEmployees;
            document.getElementById('total-leaves').textContent = visible.length;
            
            const today = new Date(); today.setHours(0,0,0,0);
            const future = new Date(today); future.setDate(future.getDate() + 30);
            
            let upcoming = 0;
            visible.forEach(leave => {
                const start = parseDate(leave.start);
                if (start && start >= today && start <= future) upcoming++;
            });
            document.getElementById('upcoming-count').textContent = upcoming;
            
            let totalDays = 0;
            visible.forEach(leave => totalDays += getDaysBetween(leave.start, leave.end));
            document.getElementById('avg-duration').textContent = visible.length ? (totalDays / visible.length).toFixed(1) : '0';
        }

        function renderCalendar(month, year) {
            currentMonth = month;
            currentYear = year;
            
            const monthNames = ["January","February","March","April","May","June","July","August","September","October","November","December"];
            document.getElementById('calendar-month').textContent = monthNames[month];
            document.getElementById('calendar-year').textContent = year;
            
            const grid = document.getElementById('calendar-grid');
            grid.innerHTML = '';
            
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const today = new Date(); today.setHours(0,0,0,0);
            
            for (let i = 0; i < firstDay; i++) {
                const empty = document.createElement('div');
                empty.className = 'calendar-day bg-white/50 border border-transparent rounded-2xl';
                grid.appendChild(empty);
            }
            
            for (let day = 1; day <= daysInMonth; day++) {
                const cellDate = new Date(year, month, day);
                cellDate.setHours(0,0,0,0);
                const dayLeaves = getLeavesForDate(cellDate);
                
                const cell = document.createElement('div');
                cell.className = `calendar-day bg-white border border-slate-200 rounded-2xl p-1.5 sm:p-2 flex flex-col cursor-pointer relative overflow-hidden active:bg-slate-100`;
                
                if (cellDate.getTime() === today.getTime()) {
                    cell.classList.add('today', 'ring-2', 'ring-offset-1', 'ring-yellow-300');
                }
                
                const dateNum = document.createElement('div');
                dateNum.className = `text-xs sm:text-sm font-semibold ${cellDate.getTime() === today.getTime() ? 'text-yellow-600' : 'text-slate-700'}`;
                dateNum.textContent = day;
                cell.appendChild(dateNum);
                
                if (dayLeaves.length > 0) {
                    const container = document.createElement('div');
                    container.className = 'mt-1 flex flex-wrap gap-1 items-center';
                    
                    const holidayCount = dayLeaves.filter(l => l.type === 'Holiday').length;
                    const unpaidCount = dayLeaves.filter(l => l.type === 'Unpaid Leave').length;
                    
                    if (holidayCount > 0) {
                        const dot = document.createElement('div');
                        dot.className = `leave-dot bg-emerald-500`;
                        container.appendChild(dot);
                        if (holidayCount > 1) {
                            const c = document.createElement('span');
                            c.className = 'text-[9px] font-bold text-emerald-600 -ml-0.5';
                            c.textContent = holidayCount;
                            container.appendChild(c);
                        }
                    }
                    if (unpaidCount > 0) {
                        const dot = document.createElement('div');
                        dot.className = `leave-dot bg-amber-500 ml-0.5`;
                        container.appendChild(dot);
                        if (unpaidCount > 1) {
                            const c = document.createElement('span');
                            c.className = 'text-[9px] font-bold text-amber-600 -ml-0.5';
                            c.textContent = unpaidCount;
                            container.appendChild(c);
                        }
                    }
                    
                    if (dayLeaves.length <= 2) {
                        const names = document.createElement('div');
                        names.className = 'text-[8px] leading-none text-slate-500 font-medium mt-0.5 w-full truncate';
                        names.textContent = dayLeaves.map(l => l.employee.split(' ').map(p => p[0]).join('')).join(', ');
                        container.appendChild(names);
                    } else {
                        const more = document.createElement('div');
                        more.className = 'text-[8px] font-bold text-indigo-600 bg-indigo-100 px-1 rounded mt-0.5';
                        more.textContent = `+${dayLeaves.length}`;
                        container.appendChild(more);
                    }
                    
                    cell.appendChild(container);
                    cell.onclick = () => showDayModal(cellDate, dayLeaves);
                } else {
                    cell.onclick = () => showDayModal(cellDate, []);
                }
                
                grid.appendChild(cell);
            }
            
            const remaining = (7 - ((firstDay + daysInMonth) % 7)) % 7;
            for (let i = 0; i < remaining; i++) {
                const empty = document.createElement('div');
                empty.className = 'calendar-day bg-white/40 border border-transparent rounded-2xl';
                grid.appendChild(empty);
            }
        }

        function prevMonth() { currentMonth--; if (currentMonth < 0) { currentMonth = 11; currentYear--; } renderCalendar(currentMonth, currentYear); }
        function nextMonth() { currentMonth++; if (currentMonth > 11) { currentMonth = 0; currentYear++; } renderCalendar(currentMonth, currentYear); }

        function showDayModal(date, dayLeaves) {
            const modal = document.getElementById('day-modal');
            const content = document.getElementById('modal-content');
            
            document.getElementById('modal-date').textContent = date.toLocaleDateString('en-GB', {day:'numeric', month:'long'});
            document.getElementById('modal-day-name').textContent = date.toLocaleDateString('en-GB', {weekday:'long'});
            content.innerHTML = '';
            
            if (dayLeaves.length === 0) {
                content.innerHTML = '<div class="text-center py-8"><i class="fa-solid fa-calendar text-5xl text-slate-300 mb-4"></i><p class="text-slate-500">No one is on leave this day.</p></div>';
                document.getElementById('modal-count').textContent = '0 leaves';
            } else {
                let html = '<div class="space-y-3">';
                for (let i = 0; i < dayLeaves.length; i++) {
                    const leave = dayLeaves[i];
                    const dur = getDaysBetween(leave.start, leave.end);
                    let statusClass = (leave.status === 'Approved') ? 'status-approved' : (leave.status === 'Requested') ? 'status-requested' : 'status-denied';
                    let typeClass = (leave.type === 'Holiday') ? 'type-holiday' : 'type-unpaid';
                    let icon = (leave.type === 'Holiday') ? 'fa-umbrella-beach' : 'fa-hand-holding-usd';
                    let color = (leave.type === 'Holiday') ? 'bg-emerald-100 text-emerald-600' : 'bg-amber-100 text-amber-600';
                    
                    html += '<div class="border border-slate-200 rounded-2xl p-4 flex gap-4 bg-white">' +
                        '<div class="w-9 h-9 rounded-2xl flex-shrink-0 flex items-center justify-center text-lg ' + color + '">' +
                            '<i class="fa-solid ' + icon + '"></i>' +
                        '</div>' +
                        '<div class="flex-1 min-w-0">' +
                            '<div class="flex justify-between items-start">' +
                                '<div class="font-semibold">' + leave.employee + '</div>' +
                                '<div class="px-2.5 py-px text-xs font-bold rounded-full ' + statusClass + '">' + leave.status + '</div>' +
                            '</div>' +
                            '<div class="flex items-center gap-x-2 mt-1">' +
                                '<span class="px-2 py-px text-xs font-medium rounded ' + typeClass + '">' + leave.type + '</span>' +
                                '<span class="text-xs text-slate-500">' + formatDate(leave.start) + ' — ' + formatDate(leave.end) + '</span>' +
                            '</div>' +
                            '<div class="mt-1.5 text-xs text-slate-500">' +
                                '<span class="font-mono bg-slate-100 px-1.5 py-px rounded">' + dur + ' day' + (dur > 1 ? 's' : '') + '</span>' +
                            '</div>' +
                        '</div>' +
                    '</div>';
                }
                html += '</div>';
                content.innerHTML = html;
                document.getElementById('modal-count').textContent = dayLeaves.length + ' on leave';
            }
            modal.style.display = 'flex';
        }

        function hideDayModal() {
            document.getElementById('day-modal').style.display = 'none';
        }

        function init() {
            updateStats();
            renderCalendar(currentMonth, currentYear);
            
            console.log('%c[Winchester Holiday Calendar] Clean version - no buttons, no today!', 'color:#64748b');
        }

        window.onload = init;
    </script>
</body>
</html>
